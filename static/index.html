<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Brickboard</title>
    <script src="https://unpkg.com/twemoji@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <script src="/static/main.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <h1>Brickboard</h1>
    <div class="grid">
        <div class="column">
            <h2>🌡️ Temperature: <span id="temperature">Loading...</span></h2>
            <h2>💧 Humidity: <span id="humidity">Loading...</span></h2>
            <h2>💨 CO₂: <span id="co2">Loading...</span></h2>
        </div>
        <div class="column">
            <h2>🌐 External IP: <span id="external-ip">Loading...</span></h2>
            <h2>💾 Storage: <span id="storage">Loading...</span> GB</h2>
        </div>
        <div class="column" id="pc-list">
            <!-- <h2>🖥️ cat-heater: <span id="cat-heater">Loading...</span></h2>
            <h2>🖥️ bad-boi: <span id="bad-boi">Loading...</span></h2> -->
        </div>

    </div>
    <script>
        twemoji.parse(document.body);
    </script>
</body>

</html>
